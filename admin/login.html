<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Digital Farmers Market</title>
    <link rel="stylesheet" href="/css/responsive.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #2e7d32; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔐 Admin Login</h1>
    <div class="subtitle">Login to access the admin dashboard</div>

    <form id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div id="message" class="message"></div>
</div>

<script>
// FIXED: Remove the extra /api from the URL - use direct backend URL without double /api
const BACKEND_URL = 'http://localhost:5000';

// 🔥 SIMPLE + CLEAN TOKEN STORAGE
function saveAuth(token, user) {
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify(user));
}

// 🔐 LOGIN HANDLER
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const message = document.getElementById('message');
    message.style.display = 'none';

    try {
        // FIXED: Use correct endpoint without double /api
        const res = await fetch(`${BACKEND_URL}/api/auth/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        console.log('Login response:', data);

        if (res.ok && data.token) {
            // ✅ SAVE TOKEN
            saveAuth(data.token, data.admin || data.user);

            message.textContent = 'Login successful!';
            message.className = 'message success';
            message.style.display = 'block';

            // 🔥 REDIRECT
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);

        } else {
            throw new Error(data.message || data.error || 'Login failed');
        }

    } catch (err) {
        message.textContent = err.message;
        message.className = 'message error';
        message.style.display = 'block';
    }
});

// 🔍 CHECK EXISTING TOKEN
(function () {
    const token = localStorage.getItem('token');

    if (!token) return;

    fetch(`${BACKEND_URL}/api/admin/analytics`, {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(res => {
        if (res.ok) {
            window.location.href = 'dashboard.html';
        } else {
            localStorage.clear();
        }
    })
    .catch(() => localStorage.clear());
})();
</script>

</body>
</html>
