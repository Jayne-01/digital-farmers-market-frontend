<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - Digital Farmers Market</title>
    <link rel="icon" type="image/png" href="/Logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e9f5e9 0%, #cde3cd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }
        
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }
        
        .auth-card:hover {
            transform: translateY(-2px);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 24px;
        }
        
        .logo img {
            height: 60px;
            width: auto;
            border-radius: 8px;
        }
        
        .logo span {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1f2937;
        }
        
        .auth-header h2 {
            font-size: 1.75rem;
            color: #1f2937;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        .auth-form {
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 0.875rem;
        }
        
        .form-group label i {
            color: #10b981;
            width: 20px;
            margin-right: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }
        
        .form-group input.error-input {
            border-color: #dc2626;
            background-color: #fef2f2;
        }
        
        .form-options {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }
        
        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            color: #6b7280;
        }
        
        .checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #10b981;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            width: 100%;
        }
        
        .btn-primary {
            background: #10b981;
            color: white;
        }
        
        .btn-primary:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary.loading {
            opacity: 0.8;
            pointer-events: none;
        }
        
        .btn-block {
            width: 100%;
        }
        
        .auth-divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 60px);
            height: 1px;
            background: #e5e7eb;
        }
        
        .auth-divider::before {
            left: 0;
        }
        
        .auth-divider::after {
            right: 0;
        }
        
        .auth-divider span {
            background: white;
            padding: 0 16px;
            color: #9ca3af;
            font-size: 0.8rem;
        }
        
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #374151;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }
        
        .btn-google:hover {
            background: #f9fafb;
            border-color: #10b981;
            transform: translateY(-1px);
        }
        
        .btn-google img {
            width: 20px;
            height: 20px;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
        }
        
        .auth-footer p {
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 12px;
        }
        
        .auth-footer a {
            color: #10b981;
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            font-size: 0.8rem;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 9999;
            animation: slideIn 0.3s ease;
            max-width: calc(100% - 40px);
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #3b82f6; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .fade-out {
            animation: fadeOut 0.3s ease forwards;
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e5e7eb;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .maintenance-message {
            background: #fef3c7;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            color: #92400e;
            text-align: center;
            font-size: 0.875rem;
        }
        
        .fa-spinner {
            animation: spin 0.7s linear infinite;
        }
        
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 20px;
            }
            .logo img {
                height: 50px;
            }
            .auth-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay" style="display: flex;">
        <div class="loading-spinner"></div>
    </div>

    <div class="auth-container" id="authContainer" style="display: none;">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/farmer/dashboard.html" class="logo">
                    <img src="/farmer/Logo.png" alt="Logo" onerror="this.src='/Logo.png'">
                    <span>Digital Farmers Market</span>
                </a>
                <h2>Welcome Back</h2>
                <p>Login to access your account</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" name="remember" id="rememberCheckbox">
                        <span>Remember me</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="auth-divider">
                <span>Or continue with</span>
            </div>
            
            <button type="button" id="googleSignInBtn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Sign in with Google
            </button>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="/auth/register.html">Sign up here</a></p>
                <a href="/" class="back-home">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== FIXED: DEPLOYED BACKEND URL ====================
        const BACKEND_URL = 'https://digital-farmers-market-backend-1.onrender.com';
        
        // DOM Elements
        const loadingOverlay = document.getElementById('loadingOverlay');
        const authContainer = document.getElementById('authContainer');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('rememberCheckbox');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleSignInBtn');
        
        let toastTimer = null;
        let currentToast = null;
        
        function showToast(message, type = 'success', duration = 3000) {
            if (currentToast && currentToast.remove) currentToast.remove();
            if (toastTimer) clearTimeout(toastTimer);
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            document.body.appendChild(toast);
            currentToast = toast;
            
            toastTimer = setTimeout(() => {
                if (toast) {
                    toast.classList.add('fade-out');
                    setTimeout(() => toast.remove(), 300);
                }
                toastTimer = null;
            }, duration);
        }
        
        function clearInputErrors() {
            if (emailInput) emailInput.classList.remove('error-input');
            if (passwordInput) passwordInput.classList.remove('error-input');
        }
        
        function showInputError(input, isError = true) {
            if (!input) return;
            if (isError) {
                input.classList.add('error-input');
            } else {
                input.classList.remove('error-input');
            }
        }
        
        function setButtonLoading(button, isLoading, customText = null) {
            if (!button) return;
            
            if (isLoading) {
                if (!button.getAttribute('data-original-content')) {
                    button.setAttribute('data-original-content', button.innerHTML);
                }
                button.classList.add('loading');
                button.disabled = true;
                button.innerHTML = customText || '<i class="fas fa-spinner"></i> Logging in...';
            } else {
                button.classList.remove('loading');
                button.disabled = false;
                const original = button.getAttribute('data-original-content');
                if (original) {
                    button.innerHTML = original;
                }
            }
        }
        
        function resetLoginButton() {
            if (loginBtn) {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                const original = loginBtn.getAttribute('data-original-content');
                if (original) {
                    loginBtn.innerHTML = original;
                } else {
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }
        }
        
        function validateForm() {
            clearInputErrors();
            
            const email = emailInput ? emailInput.value.trim() : '';
            const password = passwordInput ? passwordInput.value : '';
            
            let isValid = true;
            
            if (!email) {
                showInputError(emailInput, true);
                showToast('Please enter your email address', 'error');
                emailInput?.focus();
                isValid = false;
            } else if (!email.includes('@') || !email.includes('.')) {
                showInputError(emailInput, true);
                showToast('Please enter a valid email address', 'error');
                emailInput?.focus();
                isValid = false;
            } else if (!password) {
                showInputError(passwordInput, true);
                showToast('Please enter your password', 'error');
                passwordInput?.focus();
                isValid = false;
            }
            
            return isValid ? { email, password, isValid: true } : { isValid: false };
        }
        
        async function checkMaintenanceMode() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const response = await fetch(`${BACKEND_URL}/api/maintenance-status`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                return data.maintenance_mode === true;
            } catch (error) {
                console.log('Maintenance check failed:', error);
                return false;
            }
        }
        
        async function tryAdminLogin(email, password) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(`${BACKEND_URL}/api/auth/admin/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    return { success: true, data: data, isAdmin: true };
                }
                return { success: false };
            } catch (error) {
                return { success: false };
            }
        }
        
        async function tryCustomerLogin(email, password) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const data = await response.json();
                
                if (response.status === 503 && data.maintenance === true) {
                    return { success: false, maintenance: true, message: data.message };
                }
                
                if (response.ok && data.token) {
                    return { success: true, data: data, isAdmin: false };
                }
                return { success: false, maintenance: false };
            } catch (error) {
                return { success: false, maintenance: false };
            }
        }
        
        async function handleLogin(email, password, remember) {
            const isMaintenanceOn = await checkMaintenanceMode();
            
            let loginResult = await tryAdminLogin(email, password);
            
            if (loginResult.success) {
                const data = loginResult.data;
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.admin || data.user));
                
                if (remember) {
                    localStorage.setItem('remembered_email', email);
                } else {
                    localStorage.removeItem('remembered_email');
                }
                
                showToast('Login successful! Redirecting...', 'success', 800);
                
                setTimeout(() => {
                    window.location.href = '/admin/dashboard.html';
                }, 500);
                
                return { success: true };
            }
            
            if (isMaintenanceOn) {
                showToast('System is under maintenance. Please try again later.', 'error', 3000);
                setTimeout(() => {
                    window.location.href = '/maintenance.html';
                }, 2000);
                return { success: false, maintenance: true };
            }
            
            loginResult = await tryCustomerLogin(email, password);
            
            if (loginResult.success) {
                const data = loginResult.data;
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                if (remember) {
                    localStorage.setItem('remembered_email', email);
                } else {
                    localStorage.removeItem('remembered_email');
                }
                
                showToast('Login successful! Redirecting...', 'success', 800);
                
                const role = data.user.role;
                let redirectUrl = '/customer/marketplace.html';
                if (role === 'FARMER') redirectUrl = '/farmer/dashboard.html';
                
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 500);
                
                return { success: true };
            } else if (loginResult.maintenance) {
                showToast(loginResult.message || 'System is under maintenance. Please try again later.', 'error', 3000);
                setTimeout(() => {
                    window.location.href = '/maintenance.html';
                }, 2000);
                return { success: false, maintenance: true };
            } else {
                throw new Error('Invalid email or password');
            }
        }
        
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                clearInputErrors();
                
                const validation = validateForm();
                if (!validation.isValid) return;
                
                const { email, password } = validation;
                const remember = rememberCheckbox ? rememberCheckbox.checked : false;
                
                setButtonLoading(loginBtn, true);
                
                try {
                    await handleLogin(email, password, remember);
                } catch (error) {
                    console.error('Login error:', error);
                    
                    let errorMessage = 'Login failed. Please try again.';
                    if (error.message.includes('timeout')) {
                        errorMessage = 'Connection timeout. Please check your network.';
                    } else if (error.message.includes('password') || error.message.includes('email')) {
                        errorMessage = error.message;
                        if (error.message.toLowerCase().includes('password') || 
                            error.message.toLowerCase().includes('invalid')) {
                            showInputError(passwordInput, true);
                        }
                    }
                    
                    showToast(errorMessage, 'error');
                    resetLoginButton();
                }
            });
        }
        
        if (emailInput) {
            emailInput.addEventListener('focus', () => emailInput.classList.remove('error-input'));
            emailInput.addEventListener('input', () => emailInput.classList.remove('error-input'));
        }
        
        if (passwordInput) {
            passwordInput.addEventListener('focus', () => passwordInput.classList.remove('error-input'));
            passwordInput.addEventListener('input', () => passwordInput.classList.remove('error-input'));
        }
        
        // FIXED: Google Sign In with correct deployed backend URL
        if (googleBtn) {
            googleBtn.addEventListener('click', async () => {
                const isMaintenanceOn = await checkMaintenanceMode();
                if (isMaintenanceOn) {
                    showToast('Google login is disabled during maintenance', 'error');
                    setTimeout(() => {
                        window.location.href = '/maintenance.html';
                    }, 1500);
                    return;
                }
                
                if (rememberCheckbox && rememberCheckbox.checked && emailInput && emailInput.value.trim()) {
                    localStorage.setItem('remembered_email', emailInput.value.trim());
                }
                
                // SAVE ORIGINAL CONTENT
                const originalContent = googleBtn.innerHTML;
                googleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redirecting...';
                googleBtn.disabled = true;
                
                // FIXED: Use deployed backend URL, NOT localhost
                // Add a small delay to ensure the button state is shown
                setTimeout(() => {
                    window.location.href = `${BACKEND_URL}/api/auth/google`;
                }, 100);
                
                // Fallback: re-enable button after 5 seconds if redirect doesn't happen
                setTimeout(() => {
                    if (googleBtn && googleBtn.disabled) {
                        googleBtn.innerHTML = originalContent;
                        googleBtn.disabled = false;
                    }
                }, 5000);
            });
        }
        
        // Prefetch for faster navigation
        if ('requestIdleCallback' in window) {
            requestIdleCallback(() => {
                const prefetchUrls = ['/admin/dashboard.html', '/farmer/dashboard.html', '/customer/marketplace.html'];
                prefetchUrls.forEach(url => {
                    const link = document.createElement('link');
                    link.rel = 'prefetch';
                    link.href = url;
                    link.as = 'document';
                    document.head.appendChild(link);
                });
            });
        }
        
        // Keyboard shortcut: Ctrl+Enter to submit
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                if (loginForm && loginBtn && !loginBtn.disabled) {
                    loginForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
                }
            }
        });
        
        window.addEventListener('beforeunload', () => {
            if (toastTimer) clearTimeout(toastTimer);
        });
        
        // Initialize page - Faster loading
        (async function init() {
            // Hide loading overlay immediately
            if (loadingOverlay) {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 200);
            }
            
            // Show auth container
            if (authContainer) {
                authContainer.style.display = 'block';
                authContainer.style.opacity = '0';
                authContainer.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    if (authContainer) {
                        authContainer.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                        authContainer.style.opacity = '1';
                        authContainer.style.transform = 'translateY(0)';
                    }
                }, 50);
            }
            
            // Load remembered email
            try {
                const rememberedEmail = localStorage.getItem('remembered_email');
                if (rememberedEmail && emailInput) {
                    emailInput.value = rememberedEmail;
                    if (rememberCheckbox) rememberCheckbox.checked = true;
                    // Auto-focus password if email is remembered
                    if (passwordInput) passwordInput.focus();
                } else if (emailInput) {
                    emailInput.focus();
                }
            } catch (e) { }
            
            // Log load time
            if (performance && performance.timing) {
                const loadTime = performance.timing.loadEventEnd - performance.timing.navigationStart;
                console.log(`✅ Login page loaded in ${loadTime}ms`);
            }
        })();
    </script>
</body>
</html>
