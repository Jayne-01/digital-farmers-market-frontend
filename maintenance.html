<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Marketplace - Digital Farmers Market</title>
    
    <script>
        (function() {
            document.documentElement.style.display = 'none';
            fetch('https://digital-farmers-market-backend-1.onrender.com/api/maintenance-status')
                .then(res => res.json())
                .then(data => {
                    if (data.maintenance_mode === true) {
                        localStorage.clear();
                        sessionStorage.clear();
                        window.location.replace('/maintenance.html');
                    } else {
                        document.documentElement.style.display = '';
                    }
                })
                .catch(err => {
                    console.log('Maintenance check failed:', err);
                    document.documentElement.style.display = '';
                });
        })();
    </script>
    
    <link rel="icon" type="image/png" href="/customer/Logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fefef7;
            color: #111827;
            overflow-x: hidden;
            width: 100%;
        }
        
        /* ========== NAVBAR - SEARCH BAR PERMANENTLY BELOW ========== */
        .navbar-customer {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: white;
            width: 100%;
            border-bottom: 1px solid #eef2f0;
        }
        
        /* Top row - Logo + Navigation only (no search) */
        .navbar-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            padding: 0.7rem 1rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .logo img {
            height: 40px;
            width: auto;
            border-radius: 8px;
        }
        .logo span {
            font-weight: 600;
            font-size: 1rem;
            color: #111827;
            white-space: nowrap;
        }
        
        /* Navigation actions - will wrap if needed */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0.45rem 0.7rem;
            text-decoration: none;
            color: #374151;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 30px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav-link i {
            font-size: 0.95rem;
        }
        .nav-link.active {
            background: #f0fdf4;
            color: #16a34a;
        }
        .nav-link.active i {
            color: #16a34a;
        }
        .nav-link:hover {
            background: #f3f4f6;
        }
        
        .badge {
            background: #16a34a;
            color: white;
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.1rem 0.4rem;
            border-radius: 20px;
            margin-left: 3px;
        }
        
        .btn-seller {
            background: #16a34a;
            border: none;
            padding: 0.45rem 0.8rem;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-seller:hover {
            background: #15803d;
        }
        
        .user-dropdown, .notification-dropdown {
            position: relative;
        }
        .user-toggle, .notification-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            background: none;
            border: none;
            padding: 0.4rem 0.6rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .avatar {
            width: 28px;
            height: 28px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #16a34a;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .dropdown-menu, .notification-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            min-width: 160px;
            z-index: 1000;
            margin-top: 8px;
            display: none;
        }
        .dropdown-menu.show, .notification-menu.show {
            display: block;
        }
        .dropdown-menu a {
            display: block;
            padding: 0.6rem 1rem;
            text-decoration: none;
            color: #111827;
            font-size: 0.85rem;
        }
        .dropdown-menu a:hover {
            background: #f9fafb;
        }
        .logout-btn {
            color: #dc2626 !important;
        }
        
        /* Bottom row - Search bar only (permanently below) */
        .search-bottom-row {
            width: 100%;
            padding: 0.6rem 1rem 0.8rem 1rem;
            background: white;
            border-top: 1px solid #f0f0f0;
        }
        
        .search-box {
            position: relative;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
            z-index: 1;
        }
        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            font-size: 0.85rem;
            background: white;
            transition: all 0.2s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #16a34a;
            box-shadow: 0 0 0 2px rgba(22,163,74,0.1);
        }
        
        /* When screen gets very small, hide some text labels */
        @media (max-width: 700px) {
            .nav-link span:not(.badge) {
                display: none;
            }
            .nav-link {
                padding: 0.4rem 0.55rem;
            }
            .btn-seller span {
                display: none;
            }
            .btn-seller {
                padding: 0.4rem 0.65rem;
            }
            .user-toggle span#customer-name {
                display: none;
            }
            .user-toggle {
                padding: 0.4rem 0.5rem;
            }
            .logo span {
                font-size: 0.85rem;
            }
            .logo img {
                height: 34px;
            }
        }
        
        /* Extra small devices */
        @media (max-width: 480px) {
            .navbar-top {
                padding: 0.5rem 0.6rem;
                gap: 0.4rem;
            }
            .nav-actions {
                gap: 0.15rem;
            }
            .nav-link {
                padding: 0.35rem 0.45rem;
            }
            .btn-seller {
                padding: 0.35rem 0.55rem;
            }
            .avatar {
                width: 26px;
                height: 26px;
                font-size: 0.7rem;
            }
            .logo img {
                height: 30px;
            }
            .search-bottom-row {
                padding: 0.5rem 0.6rem 0.7rem 0.6rem;
            }
        }
        
        /* ========== OTHER STYLES ========== */
        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            z-index: 11000;
            animation: slideInRight 0.25s ease;
            border-left: 4px solid #16a34a;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .products-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
        }
        
        .product-card-marketplace {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            transition: 0.2s;
        }
        
        .product-image {
            width: 200px;
            height: 200px;
            flex-shrink: 0;
            background: #fafaf5;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info {
            padding: 1rem 1.2rem;
            flex: 1;
        }
        .product-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.4rem; }
        .product-description { font-size: 0.85rem; color: #4b5563; margin: 0.5rem 0; }
        .farmer-info-minimal {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.5rem 0;
            cursor: pointer;
            border-top: 1px solid #f3f4f6;
            border-bottom: 1px solid #f3f4f6;
            margin: 0.5rem 0;
        }
        .price-minimal { font-size: 1.1rem; font-weight: 600; color: #16a34a; }
        .action-buttons-minimal {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }
        .action-btn {
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            border: 1px solid #e5e7eb;
            background: white;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .cart-btn { background: #16a34a; color: white; border: none; }
        .buy-now-btn { background: #3b82f6; color: white; border: none; }
        
        @media (max-width: 700px) {
            .product-card-marketplace { flex-direction: column; }
            .product-image { width: 100%; height: 180px; }
            .products-container { padding: 1rem; }
            .action-buttons-minimal { flex-wrap: wrap; }
        }
        
        .category-nav {
            padding: 0.5rem 2rem;
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .category-btn {
            background: #f3f4f6;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        .category-btn.active {
            background: #16a34a;
            color: white;
        }
        .marketplace-hero {
            background: linear-gradient(135deg, #eef6ee, #ffffff);
            padding: 2rem;
            text-align: center;
        }
        .filter-toggle-btn {
            margin: 1rem 2rem 0 auto;
            display: block;
            background: white;
            border: 1px solid #ddd;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .filters-panel {
            display: none;
            padding: 1rem 2rem;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
        }
        .filters-panel.show { display: block; }
        .filters-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal { background: white; border-radius: 24px; max-width: 90vw; max-height: 90vh; overflow: auto; }
        .farmer-profile-modal-content { max-width: 460px; background: white; border-radius: 24px; }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }
        
        .notification-menu {
            width: 360px;
            max-width: 90vw;
        }
        .notification-header {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .notification-list {
            max-height: 380px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar-customer">
        <!-- TOP ROW: Logo + Navigation only (NO search bar) -->
        <div class="navbar-top">
            <a href="/customer/marketplace.html" class="logo">
                <img src="Logo.png" alt="Logo" onerror="this.style.display='none'">
                <span>Digital Farmers Market</span>
            </a>
            
            <div class="nav-actions">
                <a href="/customer/marketplace.html" class="nav-link active">
                    <i class="fas fa-store"></i>
                    <span>Market</span>
                </a>
                <a href="/customer/cart.html" class="nav-link" id="cart-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Cart</span>
                    <span class="badge" id="cart-count">0</span>
                </a>
                <a href="/customer/orders.html" class="nav-link">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Orders</span>
                    <span class="badge" id="orders-badge" style="display: none;">0</span>
                </a>
                <a href="/customer/profile.html" class="nav-link">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>

                <div class="notification-dropdown">
                    <button class="notification-toggle" id="notificationToggle">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notificationBadge" style="display: none;">0</span>
                    </button>
                    <div class="notification-menu" id="notificationMenu">
                        <div class="notification-header">
                            <h4>Notifications</h4>
                            <button class="mark-all-read" id="markAllRead">Mark all read</button>
                        </div>
                        <div class="notification-list" id="notificationList"><div class="loading">Loading...</div></div>
                    </div>
                </div>

                <button class="btn-seller" id="becomeSellerBtn">
                    <i class="fas fa-store-alt"></i>
                    <span>Seller</span>
                </button>
                <a href="/farmer/dashboard.html" class="btn-seller" id="farmerDashboardBtn" style="display: none;">
                    <i class="fas fa-tractor"></i>
                    <span>Dashboard</span>
                </a>
                
                <div class="user-dropdown">
                    <button class="user-toggle" id="userToggle">
                        <div class="avatar"><span id="customer-initial"></span></div>
                        <span id="customer-name"></span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="/customer/profile.html">My Profile</a>
                        <a href="/farmer/dashboard.html" id="dashboard-link" style="display: none;">Seller Dashboard</a>
                        <a href="#" class="logout-btn">Logout</a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- BOTTOM ROW: Search bar only (always below, never overflows) -->
        <div class="search-bottom-row">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search products...">
            </div>
        </div>
    </nav>

    <main class="marketplace-layout">
        <div class="filter-button-container" style="text-align: right; padding: 0.5rem 2rem;">
            <button class="filter-toggle-btn" id="filterToggleBtn"><i class="fas fa-sliders-h"></i> Show Filters</button>
        </div>
        <div class="filters-panel" id="filtersPanel">
            <div class="filters-grid">
                <div class="filter-group"><label>Category</label><select id="category-filter"><option value="">All Categories</option><option>Rice</option><option>Crops</option><option>Fruits</option><option>Vegetables</option></select></div>
                <div class="filter-group"><label>Barangay</label><select id="barangay-filter"><option value="">Select Barangay</option></select></div>
                <div class="filter-group"><label>Price Range</label><div style="display: flex; gap: 5px;"><input type="number" id="min-price" placeholder="Min" style="width:80px"><span>to</span><input type="number" id="max-price" placeholder="Max" style="width:80px"></div></div>
                <div class="filter-actions" style="display: flex; gap: 0.5rem;">
                    <button id="clear-filters" style="padding:0.4rem 1rem;border-radius:30px;border:1px solid #ddd;background:white;cursor:pointer;">Clear</button>
                    <button id="apply-filters" style="padding:0.4rem 1rem;border-radius:30px;background:#16a34a;color:white;border:none;cursor:pointer;">Apply</button>
                </div>
            </div>
        </div>

        <div class="sort-options" style="display: flex; justify-content: flex-end; padding: 0 2rem 0.5rem;">
            <select id="quick-sort" style="padding:0.4rem 0.8rem;border-radius:30px;border:1px solid #ddd;">
                <option value="top_rated">⭐ Top Rated</option>
                <option value="newest">🆕 Newest</option>
                <option value="price_low">💰 Price: Low to High</option>
            </select>
        </div>
        
        <div class="category-nav">
            <button class="category-btn all-btn active" data-category="all">All Products</button>
            <button class="category-btn" data-category="Rice">Rice</button>
            <button class="category-btn" data-category="Crops">Crops</button>
            <button class="category-btn" data-category="Fruits">Fruits</button>
            <button class="category-btn" data-category="Vegetables">Vegetables</button>
        </div>
        
        <div class="marketplace-hero">
            <h1>Fresh from Local Farms</h1>
            <p>Discover fresh, high-quality agricultural products directly from farmers in Bulan, Sorsogon</p>
        </div>
        
        <div class="products-container" id="products-container">
            <div class="loading">Loading products...</div>
        </div>
        <div class="pagination" id="pagination"></div>
    </main>

    <script>
        const BACKEND_URL = 'https://digital-farmers-market-backend-1.onrender.com';
        
        // Mock data for testing
        const USE_MOCK = true;
        if (USE_MOCK && !localStorage.getItem('token')) {
            localStorage.setItem('token', 'mock-token');
            localStorage.setItem('user', JSON.stringify({ user_id: 1, full_name: 'Test User', role: 'CUSTOMER' }));
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `<div style="padding:12px 20px;">✅ ${msg}</div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token) { 
                window.location.href = '/auth/login.html'; 
                return; 
            }
            document.getElementById('customer-name').innerText = user.full_name || 'Customer';
            document.getElementById('customer-initial').innerText = (user.full_name || 'C').charAt(0);
            
            initDropdowns();
            loadProducts();
            updateCartCount();
            setupEvents();
        });
        
        async function loadProducts() {
            const container = document.getElementById('products-container');
            const mockProducts = [
                { product_id: 1, product_name: "Fresh Kamatis (Tomatoes)", price: 45, unit: "kg", stock: 50, category: "Vegetables", description: "Fresh ripe tomatoes from local farms", farm_name: "Bulan Organic Farm", barangay: "Zone 3" },
                { product_id: 2, product_name: "Sweet Mangoes", price: 120, unit: "kg", stock: 30, category: "Fruits", description: "Sweet and juicy fresh mangoes", farm_name: "Tropical Harvest", barangay: "Zone 4" },
                { product_id: 3, product_name: "Fresh Eggplant (Talong)", price: 35, unit: "kg", stock: 25, category: "Vegetables", description: "Fresh purple eggplant", farm_name: "Green Valley Farm", barangay: "Zone 1" },
                { product_id: 4, product_name: "Premium Rice", price: 55, unit: "kg", stock: 100, category: "Rice", description: "High-quality organic rice", farm_name: "Bulan Rice Growers", barangay: "Zone 5" }
            ];
            
            container.innerHTML = mockProducts.map(p => `
                <div class="product-card-marketplace">
                    <div class="product-image"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#dcfce7;"><i class="fas fa-seedling" style="font-size:3rem;color:#16a34a;"></i></div></div>
                    <div class="product-info">
                        <h3 class="product-title">${p.product_name}</h3>
                        <p class="product-description">${p.description}</p>
                        <div class="farmer-info-minimal"><i class="fas fa-tractor"></i> <strong>${p.farm_name}</strong> <span style="font-size:0.7rem;">📍 ${p.barangay}</span></div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="price-minimal">₱${p.price.toFixed(2)}/${p.unit}</span>
                            <div class="action-buttons-minimal">
                                <button class="action-btn cart-btn" onclick="addToCart(${p.product_id})"><i class="fas fa-cart-plus"></i> Cart</button>
                                <button class="action-btn buy-now-btn" onclick="buyNow(${p.product_id})">Buy</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function addToCart(pid) { showToast('Added to cart!'); updateCartCount(); }
        async function updateCartCount() { document.getElementById('cart-count').innerText = '2'; }
        window.buyNow = (pid) => { showToast('Proceeding to checkout'); };
        
        function setupEvents() {
            document.getElementById('apply-filters')?.addEventListener('click', () => loadProducts());
            document.getElementById('clear-filters')?.addEventListener('click', () => loadProducts());
            document.getElementById('filterToggleBtn')?.addEventListener('click', () => document.getElementById('filtersPanel').classList.toggle('show'));
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    loadProducts();
                });
            });
            document.getElementById('quick-sort')?.addEventListener('change', () => loadProducts());
            document.getElementById('becomeSellerBtn')?.addEventListener('click', () => window.location.href = '/auth/register-farmer.html');
            document.querySelector('.logout-btn')?.addEventListener('click', () => { localStorage.clear(); window.location.href = '/'; });
        }
        
        function initDropdowns() {
            const toggle = document.getElementById('userToggle');
            const menu = document.getElementById('dropdownMenu');
            if(toggle && menu) toggle.addEventListener('click', (e) => { e.stopPropagation(); menu.classList.toggle('show'); });
            document.addEventListener('click', () => menu?.classList.remove('show'));
            
            const notifToggle = document.getElementById('notificationToggle');
            const notifMenu = document.getElementById('notificationMenu');
            if(notifToggle && notifMenu) {
                notifToggle.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('show'); });
                document.getElementById('notificationList').innerHTML = '<div class="notification-empty">No notifications</div>';
            }
        }
    </script>
</body>
</html>
